# Publish to PyPI when a GitHub Release is published and the tag starts with 'v'.
# Assumes: releases are cut from main; no prereleases; PyPI Trusted Publishing + attestations.
# Recovery: if this workflow fails, run `gh release delete <tag> --cleanup-tag`, fix the issue, and re-create the release.

name: Upload Package to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (no API token)

jobs:
  deploy:
    # Only run if the release tag starts with 'v' (e.g., v0.1.0)
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION="v$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            echo "To fix: gh release delete $TAG --cleanup-tag, bump the version in pyproject.toml, commit and push, then re-create the release."
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Smoke test wheel
        run: |
          pip install dist/*.whl
          python -c "import ndx_spikesorting" || {
            echo "ERROR: wheel installed but import failed."
            echo "To fix: gh release delete ${{ github.event.release.tag_name }} --cleanup-tag, fix the packaging issue, commit and push, then re-create the release."
            exit 1
          }

      - name: Publish to PyPI (OIDC (OpenID Connect) + attestations)
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          attestations: true
